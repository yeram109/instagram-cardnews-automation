<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="{{ theme_css }}" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
    }

    /* ── cover image background ── */
    .cover-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .cover-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6);
    }
    .cover-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.55) 55%,
        rgba(0,0,0,0.8) 100%
      );
    }

    /* decorative background circles */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      background: var(--point);
    }
    .deco-circle.large {
      width: 680px;
      height: 680px;
      top: -180px;
      right: -180px;
    }
    .deco-circle.medium {
      width: 380px;
      height: 380px;
      bottom: -100px;
      left: -100px;
    }
    .deco-line {
      position: absolute;
      width: 3px;
      height: 120px;
      background: var(--point);
      opacity: 0.5;
      left: 90px;
      top: 50%;
      transform: translateY(-50%);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 96px;
      max-width: 100%;
    }

    .label {
      font-size: 26px;
      font-weight: 500;
      color: var(--point);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .hook {
      font-size: 80px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text-primary);
      margin-bottom: 44px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .hook em {
      font-style: normal;
      color: var(--point);
    }

    .divider {
      width: 64px;
      height: 4px;
      background: var(--point);
      margin: 0 auto 44px;
      border-radius: 2px;
    }

    .subtitle {
      font-size: 36px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      word-break: keep-all;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
      z-index: 2;
    }

    /* ── has-image 오버라이드 ── */
    .slide.has-image {
      justify-content: flex-end;
      align-items: flex-start;
    }
    .slide.has-image .deco-circle,
    .slide.has-image .deco-line {
      display: none;
    }
    .slide.has-image .content {
      text-align: left;
      padding: 0 96px 120px;
    }
    .slide.has-image .content .divider {
      margin-left: 0;
    }
    .slide.has-image .hook {
      color: #fff;
    }
    .slide.has-image .subtitle {
      color: rgba(255, 255, 255, 0.75);
    }
  </style>
</head>
<body>
  <div class="slide{% if image_path %} has-image{% endif %}">
    {% if image_path %}
      <div class="cover-bg"><img src="{{ image_path }}" alt="" /></div>
    {% endif %}
    <div class="deco-circle large"></div>
    <div class="deco-circle medium"></div>
    <div class="deco-line"></div>

    <div class="content">
      <p class="label">{{ topic }}</p>
      <h1 class="hook">{{ hook }}</h1>
      <div class="divider"></div>
      <p class="subtitle">{{ subtitle }}</p>
    </div>

    <span class="slide-num">01</span>
  </div>
</body>
</html>
