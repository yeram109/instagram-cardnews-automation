<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="{{ theme_css }}" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
    }

    /* ── text-only ── */
    .layout-text-only {
      justify-content: center;
      align-items: center;
    }
    .layout-text-only .content {
      text-align: center;
      padding: 0 96px;
    }
    .layout-text-only .content .divider {
      margin: 0 auto 44px;
    }

    /* decorative elements (text-only only) */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      background: var(--point);
    }
    .deco-circle.large {
      width: 680px;
      height: 680px;
      top: -180px;
      right: -180px;
    }
    .deco-circle.medium {
      width: 380px;
      height: 380px;
      bottom: -100px;
      left: -100px;
    }
    .deco-line {
      position: absolute;
      width: 3px;
      height: 120px;
      background: var(--point);
      opacity: 0.5;
      left: 90px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── image-top ── */
    .layout-image-top {
      flex-direction: column;
    }
    .layout-image-top .img-area {
      width: 100%;
      height: 600px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .layout-image-top .img-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .layout-image-top .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 96px;
    }

    /* ── image-center ── */
    .layout-image-center {
      justify-content: center;
      padding: 80px;
      gap: 48px;
    }
    .layout-image-center .img-area {
      width: 75%;
      align-self: center;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .layout-image-center .img-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .layout-image-center .content {
      width: 100%;
    }

    /* ── image-blur-bg ── */
    .layout-image-blur-bg {
      justify-content: flex-end;
      padding: 96px;
    }
    .layout-image-blur-bg .blur-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .layout-image-blur-bg .blur-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6);
    }
    .layout-image-blur-bg .blur-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.55) 55%,
        rgba(0,0,0,0.85) 100%
      );
    }
    .layout-image-blur-bg .content {
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .layout-image-blur-bg .hook {
      color: #fff;
    }
    .layout-image-blur-bg .subtitle {
      color: rgba(255, 255, 255, 0.8);
    }
    .layout-image-blur-bg .label {
      color: rgba(255, 255, 255, 0.7);
    }
    .layout-image-blur-bg .slide-num {
      color: #fff;
    }

    /* ── shared content styles ── */
    .content {
      position: relative;
      z-index: 2;
      max-width: 100%;
    }

    .label {
      font-size: 26px;
      font-weight: 500;
      color: var(--point);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .hook {
      font-size: 80px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text-primary);
      margin-bottom: 44px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .hook em {
      font-style: normal;
      color: var(--point);
    }

    .divider {
      width: 64px;
      height: 4px;
      background: var(--point);
      margin-bottom: 44px;
      border-radius: 2px;
    }

    .subtitle {
      font-size: 36px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      word-break: keep-all;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="slide layout-{{ layout }}">

    {% if layout == "text-only" %}
      <div class="deco-circle large"></div>
      <div class="deco-circle medium"></div>
      <div class="deco-line"></div>
    {% endif %}

    {% if layout == "image-blur-bg" %}
      <div class="blur-bg"><img src="{{ image_path }}" alt="" /></div>
    {% endif %}

    {% if layout == "image-top" or layout == "image-center" %}
      <div class="img-area"><img src="{{ image_path }}" alt="" /></div>
    {% endif %}

    <div class="content">
      <p class="label">{{ topic }}</p>
      <h1 class="hook">{{ hook }}</h1>
      <div class="divider"></div>
      <p class="subtitle">{{ subtitle }}</p>
    </div>

    <span class="slide-num">01</span>
  </div>
</body>
</html>
