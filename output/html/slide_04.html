<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="file:///C:/Users/kyj57/OneDrive/Desktop/instagram-cardnews-automation/themes/tech.css" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
    }

    /* ── text-only ── */
    .layout-text-only {
      justify-content: center;
      padding: 96px;
    }
    .layout-text-only .text-block {
      width: 100%;
    }

    /* ── image-top ── */
    .layout-image-top {
      flex-direction: column;
    }
    .layout-image-top .img-area {
      width: 100%;
      height: 540px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .layout-image-top .img-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .layout-image-top .text-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 96px;
    }

    /* ── image-split ── */
    .layout-image-split {
      flex-direction: row;
    }
    .layout-image-split .img-area {
      width: 50%;
      height: 100%;
      flex-shrink: 0;
      overflow: hidden;
    }
    .layout-image-split .img-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .layout-image-split .text-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 80px;
    }

    /* ── image-blur-bg ── */
    .layout-image-blur-bg {
      justify-content: center;
      padding: 96px;
    }
    .layout-image-blur-bg .blur-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .layout-image-blur-bg .blur-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(18px) brightness(0.35) saturate(0.7);
    }
    .layout-image-blur-bg .text-block {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    /* ── text block shared ── */
    .slide-num-tag {
      display: inline-block;
      font-size: 22px;
      font-weight: 700;
      color: var(--point);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 18px;
      margin-bottom: 36px;
      letter-spacing: 0.05em;
    }

    .title {
      font-size: 58px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 40px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: var(--point);
      border-radius: 2px;
      margin-bottom: 36px;
    }

    .body-text {
      font-size: 34px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-secondary);
      word-break: keep-all;
      white-space: pre-line;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
      z-index: 10;
    }

    /* deco accent */
    .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      background: linear-gradient(to bottom, var(--point), transparent);
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="slide layout-text-only">

    

    

    

    <div class="accent-bar"></div>

    <div class="text-block">
      <span class="slide-num-tag">04</span>
      <h2 class="title">혼자 배울 수 있을까?</h2>
      <div class="divider"></div>
      <p class="body-text">유튜브, 공식 문서, 무료 강의 플랫폼 등 독학 자료가 풍부합니다.
작은 프로젝트부터 시작하면 실력이 자연스럽게 쌓입니다.
매일 30분씩 꾸준히 코딩하는 것이 가장 빠른 성장의 비결입니다.</p>
    </div>

    <span class="slide-num">04</span>
  </div>
</body>
</html>
