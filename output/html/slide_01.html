<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="file:///C:/Users/kyj57/OneDrive/Desktop/instagram-cardnews-automation/themes/tech.css" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
    }

    /* decorative background circles */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      background: var(--point);
    }
    .deco-circle.large {
      width: 680px;
      height: 680px;
      top: -180px;
      right: -180px;
    }
    .deco-circle.medium {
      width: 380px;
      height: 380px;
      bottom: -100px;
      left: -100px;
    }
    .deco-line {
      position: absolute;
      width: 3px;
      height: 120px;
      background: var(--point);
      opacity: 0.5;
      left: 90px;
      top: 50%;
      transform: translateY(-50%);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 96px;
      max-width: 100%;
    }

    .label {
      font-size: 26px;
      font-weight: 500;
      color: var(--point);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .hook {
      font-size: 80px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text-primary);
      margin-bottom: 44px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .hook em {
      font-style: normal;
      color: var(--point);
    }

    .divider {
      width: 64px;
      height: 4px;
      background: var(--point);
      margin: 0 auto 44px;
      border-radius: 2px;
    }

    .subtitle {
      font-size: 36px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      word-break: keep-all;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="deco-circle large"></div>
    <div class="deco-circle medium"></div>
    <div class="deco-line"></div>

    <div class="content">
      <p class="label">파이썬 독학</p>
      <h1 class="hook">코딩, 혼자도 됩니다</h1>
      <div class="divider"></div>
      <p class="subtitle">파이썬 독학으로 시작하는 프로그래밍의 첫걸음</p>
    </div>

    <span class="slide-num">01</span>
  </div>
</body>
</html>
