<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="file:///C:/Users/kyj57/OneDrive/Desktop/instagram-cardnews-automation/themes/tech.css" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
      padding: 96px;
      text-align: center;
    }

    /* gradient accent top bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(to right, var(--point), var(--sub));
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      background: var(--point);
    }
    .deco-circle.a {
      width: 480px;
      height: 480px;
      opacity: 0.07;
      top: -160px;
      right: -120px;
    }
    .deco-circle.b {
      width: 320px;
      height: 320px;
      opacity: 0.05;
      bottom: -80px;
      left: -80px;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .icon-wrap {
      font-size: 72px;
      margin-bottom: 40px;
      line-height: 1;
    }

    .cta-heading {
      font-size: 64px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 32px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .cta-sub {
      font-size: 34px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 72px;
      word-break: keep-all;
    }

    .cta-actions {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: var(--point);
      color: var(--bg);
      font-size: 32px;
      font-weight: 700;
      padding: 28px 64px;
      border-radius: 16px;
      letter-spacing: 0.02em;
    }

    .cta-hint {
      font-size: 28px;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar"></div>
    <div class="deco-circle a"></div>
    <div class="deco-circle b"></div>

    <div class="content">
      <div class="icon-wrap">💡</div>
      <h2 class="cta-heading">도움이 됐다면<br/>팔로우 &amp; 저장!</h2>
      <p class="cta-sub">더 유익한 콘텐츠를 매주 업데이트합니다.<br/>좋아요와 저장으로 응원해 주세요 :)</p>

      <div class="cta-actions">
        <div class="cta-btn">
          ♥ &nbsp;좋아요 + 저장하기
        </div>
        <p class="cta-hint">스와이프해서 다시 보기</p>
      </div>
    </div>

    <span class="slide-num">06</span>
  </div>
</body>
</html>
