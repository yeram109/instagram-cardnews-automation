<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <link rel="stylesheet" href="file:///C:/Users/kyj57/OneDrive/Desktop/instagram-cardnews-automation/themes/tech.css" />
  <style>
    .slide {
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-color: var(--bg);
      padding: 96px;
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: var(--point);
    }
    .deco-circle.large {
      width: 560px;
      height: 560px;
      bottom: -180px;
      right: -140px;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .label {
      font-size: 26px;
      font-weight: 600;
      color: var(--point);
      letter-spacing: 0.15em;
      margin-bottom: 28px;
    }

    .heading {
      font-size: 66px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.15;
      margin-bottom: 64px;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }

    .points {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .point-item {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      box-shadow: var(--shadow);
    }

    .point-num {
      font-size: 36px;
      font-weight: 800;
      color: var(--point);
      flex-shrink: 0;
      line-height: 1;
      margin-top: 4px;
    }

    .point-text {
      font-size: 34px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.5;
      word-break: keep-all;
    }

    .slide-num {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 24px;
      font-weight: 600;
      color: var(--point);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="deco-circle large"></div>

    <div class="content">
      <p class="label">SUMMARY</p>
      <h2 class="heading">핵심 정리</h2>

      <div class="points">
        
        <div class="point-item">
          <span class="point-num">01</span>
          <p class="point-text">파이썬은 문법이 간결해 입문자도 빠르게 배울 수 있다</p>
        </div>
        
        <div class="point-item">
          <span class="point-num">02</span>
          <p class="point-text">데이터 분석·웹 개발·자동화 등 활용 분야가 매우 넓다</p>
        </div>
        
        <div class="point-item">
          <span class="point-num">03</span>
          <p class="point-text">풍부한 무료 자료로 독학이 충분히 가능하다</p>
        </div>
        
      </div>
    </div>

    <span class="slide-num">05</span>
  </div>
</body>
</html>
